<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%">
  <defs>
    <!-- Modern Professional Gradient Background -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A" />
      <stop offset="100%" stop-color="#1E293B" />
    </linearGradient>

    <!-- Scan Line Gradient -->
    <linearGradient id="scanBeam" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0" />
      <stop offset="50%" stop-color="#22D3EE" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="1" />
    </linearGradient>

    <!-- Tech Accent Gradient -->
    <linearGradient id="aiAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22D3EE" />
      <stop offset="100%" stop-color="#6366F1" />
    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Canvas -->
  <rect width="800" height="800" rx="160" fill="url(#bgGrad)" />

  <!-- Subtle Digital Network Grid in Background -->
  <g opacity="0.08" stroke="#FFFFFF" stroke-width="1.5">
    <path d="M 100,0 L 100,800 M 200,0 L 200,800 M 300,0 L 300,800 M 400,0 L 400,800 M 500,0 L 500,800 M 600,0 L 600,800 M 700,0 L 700,800" />
    <path d="M 0,100 L 800,100 M 0,200 L 800,200 M 0,300 L 800,300 M 0,400 L 800,400 M 0,500 L 800,500 M 0,600 L 800,600 M 0,700 L 800,700" />
  </g>

  <!-- MAIN RESUME DOCUMENT (Centered and Clear) -->
  <g transform="translate(240, 150)">
    <!-- Document Card Base -->
    <rect x="0" y="0" width="320" height="440" rx="20" fill="#FFFFFF" />
    
    <!-- Profile Header Mockup -->
    <circle cx="55" cy="60" r="25" fill="#E2E8F0" />
    <rect x="95" y="42" width="140" height="16" rx="8" fill="#94A3B8" />
    <rect x="95" y="66" width="80" height="10" rx="5" fill="#CBD5E1" />
    
    <!-- Divider Line -->
    <line x1="30" y1="105" x2="290" y2="105" stroke="#E2E8F0" stroke-width="2" />

    <!-- Standard Resume Text Lines (Top Half - Raw Data) -->
    <rect x="30" y="130" width="260" height="12" rx="6" fill="#CBD5E1" />
    <rect x="30" y="155" width="220" height="12" rx="6" fill="#E2E8F0" />
    <rect x="30" y="180" width="240" height="12" rx="6" fill="#CBD5E1" />
    <rect x="30" y="205" width="180" height="12" rx="6" fill="#E2E8F0" />

    <!-- AI SCI-FI SCANNING OVERLAY (The Analyser Cutoff) -->
    <!-- This creates the visual effect of AI processing the bottom half -->
    <g>
      <!-- Glowing Scan Beam Moving Down -->
      <rect x="-10" y="235" width="340" height="40" fill="url(#scanBeam)" opacity="0.4" />
      <line x1="-20" y1="275" x2="340" y2="275" stroke="#22D3EE" stroke-width="4" filter="url(#glow)" stroke-linecap="round" />
      
      <!-- Processed/Analyzed Smart Data (Bottom Half) -->
      <!-- Text turns into tech-driven vibrant nodes, code blocks, and checkmarks -->
      <g transform="translate(0, 0)">
        <!-- Skill Badge 1 (AI Parsed) -->
        <rect x="30" y="295" width="90" height="26" rx="13" fill="#ECFDF5" stroke="#10B981" stroke-width="1.5" />
        <rect x="45" y="303" width="60" height="10" rx="5" fill="#10B981" />
        
        <!-- Skill Badge 2 (AI Parsed) -->
        <rect x="130" y="295" width="110" height="26" rx="13" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.5" />
        <rect x="145" y="303" width="80" height="10" rx="5" fill="#4F46E5" />

        <!-- AI Match Rating / Score Arc Indicator on Resume -->
        <rect x="30" y="345" width="160" height="12" rx="6" fill="url(#aiAccent)" />
        <rect x="30" y="370" width="210" height="12" rx="6" fill="url(#aiAccent)" />
        <rect x="30" y="395" width="130" height="12" rx="6" fill="url(#aiAccent)" />
        
        <!-- Verification Success Badges (The AI Approval) -->
        <circle cx="270" cy="351" r="14" fill="#10B981" filter="url(#glow)" />
        <path d="M 264,351 L 268,355 L 276,346" fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />

        <circle cx="270" cy="395" r="14" fill="#10B981" filter="url(#glow)" />
        <path d="M 264,395 L 268,399 L 276,390" fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
      </g>
    </g>
  </g>

  <!-- AI HUD & Intersecting Target Elements (Framing the resume) -->
  <g stroke="url(#aiAccent)" stroke-width="3" fill="none">
    <!-- Top Left Tech Corner -->
    <path d="M 190,170 L 190,120 L 240,120" stroke-linecap="round" />
    <!-- Bottom Right Tech Corner -->
    <path d="M 610,570 L 610,620 L 560,620" stroke-linecap="round" />
  </g>

  <!-- Floating Digital Insight Particles -->
  <circle cx="180" cy="420" r="6" fill="#22D3EE" filter="url(#glow)" />
  <line x1="186" y1="420" x2="215" y2="420" stroke="#22D3EE" stroke-width="1.5" stroke-dasharray="2 2" />
  
  <circle cx="630" cy="320" r="8" fill="#6366F1" filter="url(#glow)" />
  <line x1="590" y1="320" x2="622" y2="320" stroke="#6366F1" stroke-width="1.5" stroke-dasharray="2 2" />
</svg>
